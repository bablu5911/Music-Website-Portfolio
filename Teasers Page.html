        <nav>

    <main class="trailer-container" id="playlist-grid">
        <p style="color: white; text-align: center; grid-column: 1/-1;">Loading your teasers and trailers...</p>
    </main>

    <script>
        async function loadTeaserVideos() {
            const apiKey = "AIzaSyACKQKFM8C_1itHgHRjyfqeGFVVBJq94Z4"; 
            // Make sure to double-check if this ID needs any extra characters from your full link
            const playlistId = "PLB8c1VAP6Hx8"; 
            
            // Step 1: Fetch the initial items from your playlist
            const listTarget = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${playlistId}&key=${apiKey}`;

            try {
                const response = await fetch(listTarget);
                const listData = await response.json();
                const container = document.getElementById('playlist-grid');
                
                if (listData.items && listData.items.length > 0) {
                    // Extract all unique Video IDs to fetch their exact live/scheduled statuses
                    const videoIds = listData.items.map(item => item.snippet.resourceId.videoId).join(',');
                    
                    // Step 2: Query the main video endpoint to read liveBroadcastContent statuses
                    const videoTarget = `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${videoIds}&key=${apiKey}`;
                    const videoResponse = await fetch(videoTarget);
                    const videoData = await videoResponse.json();
                    
                    // Create a fast lookup map for video details
                    const videoStatusMap = {};
                    videoData.items.forEach(v => {
                        videoStatusMap[v.id] = v.snippet.liveBroadcastContent;
                    });

                    container.innerHTML = ''; // Clear loading message
                    
                    listData.items.forEach(item => {
                        const videoId = item.snippet.resourceId.videoId;
                        const title = item.snippet.title;
                        
                        if (title === "Private video" || title === "Deleted video") return;

                        const thumbnailUrl = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
                        const videoLink = `https://www.youtube.com/watch?v=${videoId}`;
                        
                        // Read live broadcast state: can be 'upcoming', 'live' (currently premiering), or 'none' (public)
                        const broadcastStatus = videoStatusMap[videoId] || 'none';
                        
                        const card = document.createElement('div');
                        
                        let badgeText = '';
                        let badgeClass = '';

                        // DYNAMIC LOGIC MAPPING: Checks if video is scheduled/premiere vs public
                        if (broadcastStatus === 'upcoming') {
                            card.className = 'trailer upcoming';
                            badgeText = 'Next Up';
                            badgeClass = 'status-badge';
                        } else {
                            card.className = 'trailer past';
                            badgeText = 'Released';
                            badgeClass = 'status-badge release';
                        }

                        card.innerHTML = `
                            <span class="${badgeClass}">${badgeText}</span>
                            <a href="${videoLink}" target="_blank" class="video-wrapper" style="position: relative; width: 100%; height: 180px; display: block; background: #000; overflow: hidden;">
                                <img src="${thumbnailUrl}" alt="${title}" style="width: 100%; height: 100%; object-fit: cover; display: block;" onerror="this.src='https://img.youtube.com/vi/${videoId}/hqdefault.jpg'">
                                <div class="play-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.15); transition: background 0.3s;">
                                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter: drop-shadow(0px 4px 12px rgba(0,0,0,0.5));">
                                        <path d="M8 5V19L19 12L8 5Z" fill="white"/>
                                    </svg>
                                </div>
                            </a>
                            <h3>${title}</h3>
                            <p>${broadcastStatus === 'upcoming' ? 'Scheduled Premiere' : 'Official Trailer'}</p>
                        `;
                        container.appendChild(card);
                    });
                } else {
                    container.innerHTML = `<p style="color: white; text-align: center; grid-column: 1/-1;">No public items returned. Ensure teaser playlist target is set to Public.</p>`;
                }
            } catch (error) {
                console.error("API Fetch execution failure:", error);
                container.innerHTML = `<p style="color: white; text-align: center; grid-column: 1/-1;">Error loading data string. Check configuration parameters.</p>`;
            }
        }

        window.addEventListener('DOMContentLoaded', loadTeaserVideos);
    </script>

</body>

</html>
