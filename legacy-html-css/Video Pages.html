    <main class="trailer-container" id="playlist-grid">
        <p style="color: white; text-align: center; grid-column: 1/-1;">Loading your portfolio releases...</p>
    </main>

    <script>
        async function loadPlaylistVideos() {
            // Authorized YouTube Data API credentials
            const apiKey = "AIzaSyACKQKFM8C_1itHgHRjyfqeGFVVBJq94Z4"; 
            const playlistId = "PLWovZqDAlR1E";
            
            // Querying official endpoint directly to break the 10-video limitation cap
            const apiTarget = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${playlistId}&key=${apiKey}`;

            try {
                const response = await fetch(apiTarget);
                const data = await response.json();
                const container = document.getElementById('playlist-grid');
                
                if (data.items && data.items.length > 0) {
                    container.innerHTML = ''; // Clear loading notification
                    
                    data.items.forEach(item => {
                        const videoId = item.snippet.resourceId.videoId;
                        const title = item.snippet.title;
                        
                        // Ignore any hidden deleted or private index entries
                        if (title === "Private video" || title === "Deleted video") return;

                        const thumbnailUrl = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
                        const card = document.createElement('div');
                        card.className = 'trailer';
                        
                        // Exact markup layout matching your custom CSS parameters
                        card.innerHTML = `
                            <span class="status-badge release">Released</span>
                            <div class="video-wrapper" style="position: relative; width: 100%; height: 180px; cursor: pointer; background: #000;" onclick="playVideo(this, '${videoId}')">
                                <img src="${thumbnailUrl}" alt="${title}" style="width: 100%; height: 100%; object-fit: cover; display: block;" onerror="this.src='https://img.youtube.com/vi/${videoId}/hqdefault.jpg'">
                                <div class="play-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.15); transition: background 0.3s;">
                                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter: drop-shadow(0px 4px 12px rgba(0,0,0,0.5));">
                                        <path d="M8 5V19L19 12L8 5Z" fill="white"/>
                                    </svg>
                                </div>
                            </div>
                            <h3>${title}</h3>
                            <p>Official Upload</p>
                        `;
                        container.appendChild(card);
                    });
                } else {
                    container.innerHTML = `<p style="color: white; text-align: center; grid-column: 1/-1;">No public items returned. Ensure playlist target is set to Public.</p>`;
                }
            } catch (error) {
                console.error("API Fetch execution failure:", error);
                container.innerHTML = `<p style="color: white; text-align: center; grid-column: 1/-1;">Error loading data string. Check your configuration parameters.</p>`;
            }
        }

        function playVideo(element, videoId) {
            element.innerHTML = `
                <iframe 
                    width="100%" 
                    height="100%" 
                    src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen
                    style="display: block; width: 100%; height: 100%;">
                </iframe>
            `;
        }

        window.addEventListener('DOMContentLoaded', loadPlaylistVideos);
    </script>

</body>
